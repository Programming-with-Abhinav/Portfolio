<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Play the Ultimate RPG Turn-Based Combat Engine. Manage your Mana, score Critical Hits, and beat high scores in this fast web game." />
		<title>Dynamic RPG Turn-Based Combat Engine</title>
		<link rel="stylesheet" href="style.css" />
		<link rel="preconnect" href="https://googleapis.com" />
		<link rel="preconnect" href="https://gstatic.com" crossorigin />
		<link
			href="https://googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap"
			rel="stylesheet" />
	</head>
	<body>
		<header>
			<h1>RPG Battle Arena</h1>
			<div class="score-tracker">
				🏆 High Score: <span id="high-score-val">0</span> turns
			</div>
		</header>

		<main class="game-container">
			<section class="battlefield">
				<!-- Hero Panel -->
				<div class="character-card" id="hero-panel">
					<h2>Hero</h2>
					<div class="stat-group">
						<label for="hero-health"
							>HP: <span id="hero-hp-text">100</span>/100</label
						>
						<div class="meter-container">
							<meter
								id="hero-health"
								min="0"
								low="30"
								optimum="100"
								high="70"
								max="100"
								value="100"></meter>
						</div>
					</div>
					<div class="stat-group">
						<label for="hero-mana"
							>MP: <span id="hero-mp-text">50</span>/50</label
						>
						<div class="meter-container mana">
							<meter
								id="hero-mana"
								min="0"
								low="15"
								optimum="50"
								high="35"
								max="50"
								value="50"></meter>
						</div>
					</div>
					<div class="status-badges">
						<span id="hero-shield-badge" class="badge hidden">🛡️ Shielded</span>
					</div>
				</div>

				<!-- Boss Panel -->
				<div class="character-card" id="boss-panel">
					<h2>Boss</h2>
					<div class="stat-group">
						<label for="boss-health"
							>HP: <span id="boss-hp-text">120</span>/120</label
						>
						<div class="meter-container">
							<meter
								id="boss-health"
								min="0"
								low="35"
								optimum="120"
								high="80"
								max="120"
								value="120"></meter>
						</div>
					</div>
					<div class="status-badges">
						<span id="boss-action-badge" class="badge hidden">⚡ Charging</span>
					</div>
				</div>
			</section>

			<!-- Dynamic Action Terminal -->
			<section class="controls-section" aria-label="Game Actions">
				<div class="button-grid">
					<button type="button" class="btn btn-attack" id="btn-attack">
						⚔️ Attack (90% Acc)
					</button>
					<button type="button" class="btn btn-magic" id="btn-magic">
						🔮 Magic (Cost: 20 MP)
					</button>
					<button type="button" class="btn btn-heal" id="btn-heal">
						❤️ Heal (Cost: 15 MP)
					</button>
					<button type="button" class="btn btn-block" id="btn-block">
						🛡️ Block (+10 MP)
					</button>
				</div>
				<button type="button" class="btn btn-reset hidden" id="btn-reset">
					🔄 Play Again
				</button>
			</section>

			<!-- Combat Log Screen -->
			<section class="log-section" aria-live="polite">
				<h3>Combat Log</h3>
				<div class="log-box" id="combat-log">
					<p class="log-entry system-msg">
						Welcome to the Arena. Choose an action to begin turn 1.
					</p>
				</div>
			</section>
		</main>

		<footer>
			<p>
				&copy; 2026 Retro Combat Systems. Built for peak core web performance.
			</p>
		</footer>

		<script src="AI_script.js" defer></script>
	</body>
</html>
